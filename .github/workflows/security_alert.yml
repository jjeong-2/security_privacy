name: 보안 알림 자동 발송

on:
  schedule:
    # KST = UTC+9 기준 변환
    - cron: '40 23 * * *'   # 08:40 KST (전날 23:40 UTC)
    - cron: '0 3 * * *'     # 12:00 KST (03:00 UTC)
  workflow_dispatch:         # GitHub에서 수동 실행 버튼

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 법령 캐시 복원 (중복 발송 방지)
        uses: actions/cache@v4
        with:
          path: law_seen.json
          key: law-cache-${{ github.run_id }}
          restore-keys: |
            law-cache-

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 보안 알림 발송
        env:
          KAKAO_REST_API_KEY:        ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_ACCESS_TOKEN:        ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN:       ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CHANNEL_PROFILE_KEY: ${{ secrets.KAKAO_CHANNEL_PROFILE_KEY }}
          LAW_API_KEY:               ${{ secrets.LAW_API_KEY }}
          NEWS_API_KEY:              ${{ secrets.NEWS_API_KEY }}
          SERPAPI_API_KEY:           ${{ secrets.SERPAPI_API_KEY }}
          NAVER_CLIENT_ID:           ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:       ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python main_v35.py --test

      - name: 법령 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: law_seen.json
          key: law-cache-${{ github.run_id }}
